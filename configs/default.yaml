project:
  name: "EAN-Classifier"
  seed: 42
  output_dir: "outputs"

dataset:
  name: "cifar100"          # online dataset: downloaded automatically
  data_dir: "data/cifar100"
  num_classes: 100
  image_size: 224
  batch_size: 64
  num_workers: 4
  train_split: 0.9          # fraction of training data used for training vs. validation
  augment: true
  normalize_mean: [0.5071, 0.4867, 0.4408]
  normalize_std:  [0.2675, 0.2565, 0.2761]

model:
  name: "EAN"
  encoder: "efficientnet_b0"  # timm model name; set to "cnn_baseline" for small CNN
  encoder_pretrained: true
  latent_dim: 256
  abstraction_dim: 128
  num_concept_modules: 16
  top_k: 4                   # number of concept modules selected per forward pass
  concept_hidden_dim: 256
  world_model_hidden_dim: 256
  dropout: 0.1

training:
  epochs: 20
  learning_rate: 1.0e-3
  encoder_lr: 1.0e-4         # lower LR for pretrained encoder
  weight_decay: 1.0e-4
  scheduler: "cosine"        # cosine | step | none
  warmup_epochs: 2
  world_model_loss_weight: 0.1
  evolution:
    enabled: true
    prune_every_n_epochs: 5  # prune weak modules every N epochs
    prune_fraction: 0.25     # fraction of weakest modules to prune & replace
    score_ema_alpha: 0.9     # EMA for module usage scores

evaluation:
  top_k_accuracy_k: 5

export:
  onnx_opset: 17
  export_dir: "outputs/exports"
  input_shape: [1, 3, 224, 224]
